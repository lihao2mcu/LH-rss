name: Execute Monitor
on:
  schedule:
    # 这里的 0,8,16 是 UTC 时间，对应北京时间 08:00, 16:00, 00:00
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: # 保持这个，允许你手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    # 增加下面这两行，确保机器人有权推送到 gh-pages 分支
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests feedgen
      - name: Run script
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python main.py
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output # 将输出目录下的文件发布到 Pages
